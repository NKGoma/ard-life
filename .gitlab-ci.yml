image: $CI_REGISTRY/general/ssh-client:latest

stages:
  - build
  - deploy

variables:
  CONTAINER_NAME: ard-life
  CONTAINER_PORT: "3000"
  HOST_PORT: "25000"
  STAGE_HOST_PORT: "25001"

.prep-ssh: &prep-ssh
  before_script:
    - "which ssh-agent || ( apt-get update -y && apt-get install openssh-client -y )"
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - '[[ -f /.dockerenv ]] && echo -e "Host *\n\tStrictHostKeyChecking no\n\n" > ~/.ssh/config'
    - chmod 700 ~/.ssh

# Build and push image to gitlab.ard.de container registry
build:image:
  stage: build
  image: docker:latest
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $CI_REGISTRY_IMAGE:latest -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA .
    - docker push $CI_REGISTRY_IMAGE:latest
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
  only:
    - main
    - develop

# Deploy to production (main)
deploy:production:
  needs:
    - job: build:image
  extends: .prep-ssh
  stage: deploy
  environment:
    name: production
    url: https://ardlife.hackitm.de
  only:
    - main
  script:
    - ssh $DEPLOY_USER@$SERVER -vvvv "docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY"
    - ssh $DEPLOY_USER@$SERVER "docker pull $CI_REGISTRY_IMAGE:latest"
    - ssh $DEPLOY_USER@$SERVER "docker stop $CONTAINER_NAME 2>/dev/null || true"
    - ssh $DEPLOY_USER@$SERVER "docker rm $CONTAINER_NAME 2>/dev/null || true"
    - ssh $DEPLOY_USER@$SERVER "docker run -d --name $CONTAINER_NAME --restart unless-stopped -p $HOST_PORT:$CONTAINER_PORT $CI_REGISTRY_IMAGE:latest"
    - echo "Production deployed to $SERVER"
