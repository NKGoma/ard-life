stages:
  - build
  - deploy

variables:
  IMAGE_NAME: ard-life
  CONTAINER_NAME: ard-life
  CONTAINER_PORT: "3000"
  HOST_PORT: "3000"

build:
  stage: build
  tags:
    - global-runner
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - docker build -t $IMAGE_NAME:latest .
    - docker save $IMAGE_NAME:latest | gzip > image.tar.gz
  artifacts:
    paths:
      - image.tar.gz
    expire_in: 1 hour
  only:
    - main

deploy:
  stage: deploy
  tags:
    - global-runner
  image: alpine:latest
  needs:
    - build
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - echo "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
  script:
    - scp -P ${SSH_PORT:-22} image.tar.gz ${SSH_USER}@${SSH_HOST}:/tmp/ard-life-image.tar.gz
    - |
      ssh -p ${SSH_PORT:-22} ${SSH_USER}@${SSH_HOST} << 'EOF'
        docker load < /tmp/ard-life-image.tar.gz
        docker stop ard-life 2>/dev/null || true
        docker rm ard-life 2>/dev/null || true
        docker run -d \
          --name ard-life \
          --restart unless-stopped \
          -p ${HOST_PORT:-3000}:3000 \
          ard-life:latest
        rm /tmp/ard-life-image.tar.gz
      EOF
  only:
    - main
