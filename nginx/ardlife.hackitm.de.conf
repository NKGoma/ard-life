server {
    listen 80;
    listen [::]:80;
    server_name ardlife.hackitm.de;

    # Let Let's Encrypt HTTP challenge pass through
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirect all regular HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ardlife.hackitm.de;

    # Replace with your certificate paths (Certbot default shown)
    ssl_certificate /etc/letsencrypt/live/ardlife.hackitm.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ardlife.hackitm.de/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;

    # Basic hardening headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 20m;

    location / {
        proxy_pass http://127.0.0.1:25000;
        proxy_http_version 1.1;

        # Forward original request info
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket/upgrade support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_connect_timeout 60s;
        proxy_cache_bypass $http_upgrade;
    }
}
